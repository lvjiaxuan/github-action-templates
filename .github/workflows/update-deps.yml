name: Update Dependencies

on:
  workflow_call:
    inputs:
      email:
        description: The `user.email` config.
        type: string
        required: false
        default: ${{github.actor_id}}+${{github.actor}}@users.noreply.github.com
      commit_msg:
        type: string
        required: false
        default: 'chore: update deps on CI'
      mode:
        description: How to apply updates. `commit` to push directly, `pr` to create a pull request.
        type: string
        required: false
        default: commit

jobs:
  main:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Initialize environment
        uses: lvjiaxuan/github-action-templates/.github/composite-actions/setup@main

      - name: Detect outdated dependencies
        id: update_script
        run: |
          set +e
          npx taze -r -w -i
          if [[ `git status --porcelain` ]]; then
            echo "hasChanges=true" >> $GITHUB_OUTPUT
          else
            echo "hasChanges=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup git config
        if: ${{ steps.update_script.outputs.hasChanges == 'true' }}
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ inputs.email || vars.ACTOR_EMAIL }}"

      - name: Apply updates (${{ inputs.mode }})
        if: ${{ steps.update_script.outputs.hasChanges == 'true' }}
        id: update_commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ni --package-lock-only
          currentBranch=$(git rev-parse --abbrev-ref HEAD)
          updatesBranch=update-deps/$(uuidgen)
          git checkout -b $updatesBranch
          git add .
          git commit -m "${{ inputs.commit_msg }}" --no-verify
          if [ "${{ inputs.mode }}" = "commit" ]; then
            git switch $currentBranch
            git merge $updatesBranch
            git push
            # Capture the commit hash for later use
            commitHash=$(git rev-parse HEAD)
            echo "commit_hash=$commitHash" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.mode }}" = "pr" ]; then
            git push -u origin $updatesBranch
            # gh pr create prints the PR URL on success
            prUrl=$(gh pr create --base $currentBranch --head $updatesBranch --fill)
            echo "pr_url=$prUrl" >> $GITHUB_OUTPUT
          else
            echo "::error::Unknown mode: ${{ inputs.mode }}"
            stopMarker=$(uuidgen)
            echo "::stop-commands::$stopMarker"
            exit 1
          fi

      - name: Write job summary
        run: |
          echo "# Summary :eyes:" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.update_script.outputs.hasChanges }}" = "false" ]; then
            echo "All dependencies are up to date" >> $GITHUB_STEP_SUMMARY
          else
            echo "Dependency updates applied" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ "${{ inputs.mode }}" = "commit" ]; then
              echo "## Commit Link" >> $GITHUB_STEP_SUMMARY
              echo "[${{ steps.update_commit.outputs.commit_hash }}](https://github.com/${{ github.repository }}/commit/${{ steps.update_commit.outputs.commit_hash }})" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ inputs.mode }}" = "pr" ]; then
              echo "## Pull Request Link" >> $GITHUB_STEP_SUMMARY
              echo "[${{ steps.update_commit.outputs.pr_url }}](${{ steps.update_commit.outputs.pr_url }})" >> $GITHUB_STEP_SUMMARY
            fi
          fi